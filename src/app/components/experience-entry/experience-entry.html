<div class="flex gap-6">
  <div class="flex flex-none flex-col items-center pt-1.5">
    <div
      [class]="
        'h-3.5 w-3.5 flex-none rounded-full border-[3px] border-bg shadow-[0_0_0_1px_var(--color-border)] ' +
        dotClasses()
      "
    ></div>
    <div class="mt-2 w-px flex-1 bg-border"></div>
  </div>
  <div class="min-w-0 flex-1 pb-11">
    <div class="mb-2.5 flex flex-wrap items-center gap-2.5">
      <span class="font-mono text-xs font-semibold tracking-[0.04em] text-accent">{{
        entry().range
      }}</span>
      <span
        class="rounded-pill border border-border bg-surface px-2.5 py-[3px] font-mono text-[10px] font-semibold tracking-[0.06em] text-text-tertiary uppercase"
        >{{ entry().badge }}</span
      >
    </div>

    <button
      type="button"
      (click)="toggle()"
      [attr.aria-expanded]="expanded()"
      class="block w-full cursor-pointer border-none bg-transparent p-0 text-left focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent-blue"
    >
      <div class="mb-1 font-display text-[clamp(19px,2.4vw,26px)] font-bold text-text">
        {{ entry().title }}
      </div>
      <div class="flex items-center justify-between gap-3">
        <div class="font-sans text-sm font-semibold text-text-secondary">{{ entry().org }}</div>
        <div
          class="flex h-6.5 w-6.5 flex-none items-center justify-center rounded-full border border-border font-sans text-[15px] text-text-secondary transition-transform duration-300"
          [class.rotate-180]="expanded()"
        >
          ⌄
        </div>
      </div>
    </button>

    <p class="m-0 mt-3.5 max-w-[640px] font-sans text-[14.5px] leading-[1.7] text-text-secondary">
      {{ entry().teaser }}
    </p>

    <div
      class="grid transition-[grid-template-rows] duration-450 ease-[cubic-bezier(0.16,1,0.3,1)]"
      [class]="expanded() ? 'grid-rows-[1fr]' : 'grid-rows-[0fr]'"
    >
      <div class="overflow-hidden">
        <div class="pt-4.5">
          @if (entry().bullets.length > 0) {
            <ul class="m-0 mb-4.5 flex flex-col gap-2.5 pl-4.5">
              @for (bullet of entry().bullets; track bullet) {
                <li class="font-sans text-sm leading-[1.6] text-text-secondary">{{ bullet }}</li>
              }
            </ul>
          }
          <div class="flex flex-wrap gap-2">
            @for (tag of entry().tags; track tag) {
              <span
                class="rounded-pill border border-border px-3.25 py-1.5 font-mono text-[11.5px] font-medium text-text-secondary"
                >{{ tag }}</span
              >
            }
          </div>
          @if (entry().linkHref) {
            <a
              [routerLink]="entry().linkHref"
              class="mt-4.5 inline-flex items-center gap-2 font-sans text-sm font-bold text-accent no-underline hover:underline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent-blue"
              >{{ entry().linkLabel }} →</a
            >
          }
        </div>
      </div>
    </div>
  </div>
</div>
